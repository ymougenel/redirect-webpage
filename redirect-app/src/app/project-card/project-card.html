<div class="bg-white shadow-md hover:shadow-xl rounded-lg overflow-hidden transition-shadow">
  <img [src]="project.image" alt="{{ project.title }}" class="w-full h-48 object-cover bg-gray-200">
  <div class="p-6">
    <h3 class="text-xl font-semibold mb-2">{{ project.title }}</h3>
    <p class="text-gray-600 mb-4 line-clamp-3">{{ project.description }}</p>
    <div class="flex gap-3">
      <a [href]="project.projectLink" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors">View Project</a>
      <a [href]="project.githubLink" target="_blank" class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-4 py-2 rounded-md text-sm font-medium transition-colors">GitHub</a>
    </div>
  </div>
</div>
